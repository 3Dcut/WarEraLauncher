<!DOCTYPE html>
<html lang="de" data-theme="grau">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarEra Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ========== THEME: GRAU ========== */
    :root[data-theme="grau"] {
      --bg-gradient: linear-gradient(135deg, #0a0e1a 0%, #111827 40%, #0f172a 100%);
      --accent: #f0b429;
      --accent-glow: rgba(240,180,41,0.25);
      --accent-dim: rgba(240,180,41,0.6);
      --text: #f0f0ec;
      --text-dim: #a0a8b4;
      --text-muted: #556070;
      --glass-bg: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.1);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      --tab-active-bg: rgba(240,180,41,0.15);
      --tab-hover-bg: rgba(255,255,255,0.08);
      --font-heading: 'Rajdhani', sans-serif;
      --font-mono: 'Source Code Pro', monospace;
      --reload-hover: rgba(240,180,41,0.3);
      --danger: #ef4444;
    }

    /* ========== THEME: PINK ========== */
    :root[data-theme="pink"] {
      --bg-gradient: linear-gradient(135deg, #1f001f 0%, #300040 40%, #1a001a 100%);
      --accent: #ff00ff;
      --accent-glow: rgba(255,0,255,0.35);
      --accent-dim: rgba(255,0,255,0.6);
      --text: #ffffff;
      --text-dim: #ffccff;
      --text-muted: #996699;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,0,255,0.2);
      --glass-shadow: 0 8px 32px rgba(100,0,100,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      --tab-active-bg: rgba(255,0,255,0.15);
      --tab-hover-bg: rgba(255,0,255,0.08);
      --font-heading: 'Quicksand', sans-serif;
      --font-mono: 'Source Code Pro', monospace;
      --reload-hover: rgba(255,0,255,0.3);
      --danger: #ff3366;
    }

    /* ========== BASE ========== */
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-gradient);
      color: var(--text);
      font-family: var(--font-heading);
    }

    /* ========== APP LAYOUT ========== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 8px;
    }

    /* ========== TOOLBAR ========== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 12px;
      flex-shrink: 0;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .btn-warera {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--accent-dim);
      background: var(--tab-active-bg);
      color: var(--accent);
      cursor: pointer;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn-warera:hover {
      background: var(--accent-glow);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .toolbar-sep {
      width: 1px;
      height: 22px;
      background: var(--glass-border);
    }

    /* ========== CATEGORY SELECT ========== */
    .nav-select {
      background: var(--glass-bg);
      color: var(--text);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 4px 8px;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .nav-select option {
      background: #111827;
      color: #fff;
    }

    /* ========== TOOL TABS ========== */
    .tool-tab {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 12px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .tool-tab:hover {
      background: var(--tab-hover-bg);
      color: var(--text);
    }
    .tool-tab.active {
      background: var(--tab-active-bg);
      border-color: var(--accent-dim);
      color: var(--accent);
    }
    .tool-tab .tab-emoji {
      margin-right: 4px;
    }

    .toolbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-theme {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 11px;
    }

    /* ========== CONTENT PANEL (GRID) ========== */
    .content-panel {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 1px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 12px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* ========== TOOL WINDOW ========== */
    .tool-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 380px;
      background: #0d1117;
      border-right: 1px solid var(--glass-border);
    }
    .tool-window:last-child {
      border-right: none;
    }
    .tool-header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      background: var(--glass-bg);
      border-bottom: 1px solid var(--glass-border);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      gap: 8px;
    }
    .tool-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tw-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
    }
    .tw-btn:hover {
      background: var(--tab-hover-bg);
      color: var(--text);
    }
    .tw-btn-close:hover {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }
    .tool-iframe-wrapper {
      flex: 1;
      position: relative;
    }
    .tool-iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-muted);
      font-size: 16px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .content-panel { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
      .tool-window { border-right: none; border-bottom: 1px solid var(--glass-border); min-height: 400px; width: 100%; }
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="toolbar">
      <a class="btn-warera" href="https://app.warera.io" target="_blank">&#x1F3AE; WarEra</a>
      <div class="toolbar-sep"></div>
      <select id="category-select" class="nav-select"></select>
      <div class="toolbar-sep"></div>
      <div id="tool-launchers"></div>
      <div class="toolbar-right">
        <button class="btn-theme" id="theme-toggle">&#x25C9; GRAU</button>
      </div>
    </div>

    <div class="content-panel" id="content-panel"></div>
  </div>

  <script>
    const state = {
      theme: localStorage.getItem('wl-theme') || 'grau',
      activeCategory: parseInt(localStorage.getItem('wl-active-cat') || '0', 10),
      categories: [],
      openTools: []
    };

    const $ = id => document.getElementById(id);
    const toolLaunchersEl = $('tool-launchers');
    const categorySelectEl = $('category-select');
    const contentPanelEl = $('content-panel');
    const themeToggle = $('theme-toggle');

    async function init() {
      applyTheme(state.theme);

      try {
        const res = await fetch('./tools.json');
        state.categories = await res.json();
      } catch (e) {
        state.categories = [];
      }

      try {
        const saved = JSON.parse(localStorage.getItem('wl-open-tools'));
        if (Array.isArray(saved) && saved.length > 0) state.openTools = saved;
      } catch(e) {}

      renderCategories();
      
      if (state.categories.length > 0) {
        if (state.activeCategory >= state.categories.length) state.activeCategory = 0;
        categorySelectEl.value = state.activeCategory;
        renderLauncherButtons();
        
        if (state.openTools.length === 0) {
          launchTool(0, 0, true);
        } else {
          renderOpenTools();
        }
      }
    }

    function applyTheme(theme) {
      state.theme = theme;
      document.documentElement.dataset.theme = theme;
      localStorage.setItem('wl-theme', theme);
      themeToggle.innerHTML = theme === 'pink' ? '&#x2665; PINK' : '&#x25C9; GRAU';
    }

    themeToggle.addEventListener('click', () => {
      applyTheme(state.theme === 'grau' ? 'pink' : 'grau');
    });

    categorySelectEl.addEventListener('change', (e) => {
      state.activeCategory = parseInt(e.target.value, 10);
      localStorage.setItem('wl-active-cat', state.activeCategory);
      renderLauncherButtons();
    });

    function renderCategories() {
      categorySelectEl.innerHTML = '';
      state.categories.forEach((cat, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = cat.category;
        categorySelectEl.appendChild(opt);
      });
    }

    function renderLauncherButtons() {
      toolLaunchersEl.innerHTML = '';
      if (state.categories.length === 0) return;
      const cat = state.categories[state.activeCategory];
      
      cat.tools.forEach((tool, i) => {
        const btn = document.createElement('button');
        btn.className = 'tool-tab';
        
        if (state.openTools.some(t => t.url === tool.url)) btn.classList.add('active');
        
        btn.innerHTML = `<span class="tab-emoji">${tool.emoji}</span>${tool.name}`;
        btn.addEventListener('click', () => launchTool(state.activeCategory, i));
        btn.title = `${tool.name} hinzufügen`;
        toolLaunchersEl.appendChild(btn);
      });
    }

    function saveOpenTools() {
      localStorage.setItem('wl-open-tools', JSON.stringify(state.openTools));
    }

    function launchTool(catIdx, toolIdx, bypassSave = false) {
      const tool = state.categories[catIdx].tools[toolIdx];
      const existing = state.openTools.find(t => t.url === tool.url);
      
      if (!existing) {
        state.openTools.push({ ...tool, id: Date.now() + Math.random().toString() });
      } else {
         // Optionally close it if clicked again, acting like a toggle?
         // Let's just focus/keep it for now.
      }

      if (!bypassSave) saveOpenTools();
      renderOpenTools();
      renderLauncherButtons();
    }

    window.closeTool = function(id) {
      state.openTools = state.openTools.filter(t => t.id !== id);
      saveOpenTools();
      renderOpenTools();
      renderLauncherButtons();
    };

    window.reloadTool = function(id) {
      const iframe = document.getElementById('iframe-' + id);
      if (iframe) iframe.src = iframe.src;
    };

    function renderOpenTools() {
      contentPanelEl.innerHTML = '';

      if (state.openTools.length === 0) {
        contentPanelEl.innerHTML = `<div class="empty-state">Wähle ein Tool aus der Leiste aus, um es hier zu öffnen.<br>Du kannst mehrere Tools nebeneinander nutzen!</div>`;
        return;
      }

      state.openTools.forEach(tool => {
        const win = document.createElement('div');
        win.className = 'tool-window';
        
        win.innerHTML = `
          <div class="tool-header">
            <div class="tool-title"><span class="tab-emoji">${tool.emoji}</span> ${tool.name}</div>
            <a class="tw-btn" href="${tool.url}" target="_blank" title="In neuem Tab öffnen">&#x2197;</a>
            <button class="tw-btn" onclick="reloadTool('${tool.id}')" title="Neu laden">&#x21bb;</button>
            <button class="tw-btn tw-btn-close" onclick="closeTool('${tool.id}')" title="Schließen">&#x2715;</button>
          </div>
          <div class="tool-iframe-wrapper">
            <iframe id="iframe-${tool.id}" src="${tool.url}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
          </div>
        `;
        contentPanelEl.appendChild(win);
      });
    }

    init();
  </script>
</body>
</html>
